function normalizeFootballDataStandings(data){
 const table=data?.standings?.find(s=>s.type==='TOTAL')?.table || data?.standings?.[0]?.table || [];
 return table.map(r=>({
   pos:r.position,
   team:VI_NAME[r.team?.name] || r.team?.name || '',
   tla:r.team?.tla || '',
   flag:FLAG_BY_TLA[r.team?.tla] || '',
   played:r.playedGames,
   gd:r.goalDifference,
   gf:r.goalsFor,
   ga:r.goalsAgainst,
   points:r.points
 }));
}

async function loadStandings(){
 try{
   const res=await fetch('/api/standings',{cache:'no-store'});
   if(!res.ok) throw new Error('API not ready');

   const rows=normalizeFootballDataStandings(data);
   if(!rows.length) throw new Error('No standings');
   drawStandings(rows,true);
 }catch(e){

}
