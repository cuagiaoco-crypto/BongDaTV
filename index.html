<header>
  <div class="brand"><div class="logo">⚽</div><div>WC LIVE<span class="sub">XEM BÓNG ĐÁ TRỰC TIẾP</span></div></div>
  <nav><a class="active" href="index.html">TRỰC TIẾP</a><a href="#schedule">LỊCH THI ĐẤU</a><a href="#ranking">BXH</a></nav>
</header>
<main class="wrap">
  <section class="card">
    <div class="score">
      <div class="status"><span class="dot"></span><span id="status">Đang tải...</span></div>
      <div class="teams">
        <div class="team"><span id="flagHome" class="flag">🏳️</span><div><span id="abbrHome" class="abbr">HOME</span><span id="teamHome">Đội nhà</span></div></div>
        <div><div id="score" class="bigscore">0 - 0</div><div id="minute" class="minute">Hiệp 1 · 00:00</div></div>
        <div class="team right"><div><span id="abbrAway" class="abbr">AWAY</span><span id="teamAway">Đội khách</span></div><span id="flagAway" class="flag">🏳️</span></div>
      </div>
    </div>
    <div id="player" class="player"><div class="placeholder"><div class="play">▶</div><b>Đang chờ luồng phát</b><p>Admin dán link .m3u8, MP4 hoặc iframe, trang này sẽ cập nhật tự động.</p><div id="playerError" class="err"></div></div></div>
    <div class="info"><div id="league" class="pill">World Cup</div></div>
  </section>
  <aside class="side">
    <div class="chatPanel">
      <div class="chatTabs"><div class="chatTab activeTab">Bình luận</div><div class="chatTab">Mô phỏng</div><div class="chatTab">Thông số</div></div>
      <div class="chatRoom"><div class="roomTitle">Phòng chat bóng đá trực tiếp</div><div class="roomStatus">Đã kết nối</div></div>
      <div id="comments" class="commentStream"></div>
      <div class="chatInputBar"><button class="emojiBtn">☻</button><input id="commentInput" placeholder="Đăng nhập để chat..."><button id="sendComment" class="sendBtn">➤</button></div>
    </div>
  </aside>
</main>

function avatarText(name){return (name||'KH').slice(0,2).toUpperCase()}
function renderChat(firebaseComments){
  const box=document.getElementById('comments');
  const combined=[...sampleComments, ...firebaseComments];
  box.innerHTML=combined.map(c=>`<div class="chatMsg"><div class="avatar">${avatarText(c.name)}</div><div class="msgBody"><div class="msgTop"><span class="msgName">${escapeHtml(c.name||'Khách')}</span><span class="level">LV${c.level||1}</span></div><div class="msgText">${escapeHtml(c.text||'')}</div></div></div>`).join('');
  box.scrollTop=box.scrollHeight;
}
onValue(query(ref(db,'comments'),limitToLast(100)),snap=>{const arr=[]; snap.forEach(c=>arr.push(c.val())); renderChat(arr);});
