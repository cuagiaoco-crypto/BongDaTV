<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Trực Tiếp Bóng Đá - WC LIVE</title><meta name="description" content="Xem bóng đá trực tiếp hôm nay"><style>
/* ===== FULL SCREEN RESPONSIVE + WC LIVE COVER ===== */
html,body{width:100%!important;min-width:0!important;margin:0!important;overflow-x:hidden!important;background:#020812!important}
.wc-shell{width:100%!important;max-width:1540px!important;margin:0 auto!important;padding:10px 12px 24px!important;display:grid!important;grid-template-columns:220px minmax(0,1fr) 220px!important;gap:16px!important;align-items:start!important}
.wc-main,main{min-width:0!important;width:100%!important;max-width:none!important;margin:0!important;padding:0!important}
.wc-side{display:block!important;position:sticky!important;top:82px!important}
.wc-3d-banner{width:100%!important;min-height:805px!important;border-radius:16px!important;border:2px solid #ffb52e!important;overflow:hidden!important;background:none!important;box-shadow:0 0 25px rgba(255,185,40,.35)!important}
.wc-3d-banner:before,.wc-3d-banner:after{display:none!important}
.wc-banner-inner{position:relative!important;width:100%!important;min-height:805px!important;padding:0!important;background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important}
.wc-left .wc-banner-inner{background-image:url('assets/banner-left.jpg')!important}
.wc-right .wc-banner-inner{background-image:url('assets/banner-right.jpg')!important}
.wc-banner-inner>*{display:none!important}
.wc-banner-inner .wc-ad-btn{display:block!important;position:absolute!important;left:16px!important;right:16px!important;width:auto!important;z-index:5!important;padding:14px 6px!important;border-radius:12px!important;background:linear-gradient(180deg,#ff2c2c,#a80000)!important;border:2px solid #ffc33d!important;color:#fff!important;font-size:18px!important;font-weight:1000!important;text-align:center!important;text-decoration:none!important;box-shadow:0 0 20px rgba(255,0,0,.55)!important}
.wc-left .wc-banner-inner .wc-ad-btn{bottom:92px!important}.wc-right .wc-banner-inner .wc-ad-btn{bottom:42px!important}
.wc-top-hero{width:100%!important;min-height:116px!important;margin:0 0 10px!important;border-radius:12px!important;border:1px solid rgba(255,204,67,.55)!important;overflow:hidden!important;background-image:url('assets/banner-top.jpg')!important;background-size:cover!important;background-position:center!important;box-shadow:0 0 22px rgba(255,204,67,.18),inset 0 0 35px rgba(0,0,0,.28)!important}
.wc-top-hero:before,.wc-top-hero:after{display:none!important}.wc-top-hero>*{visibility:hidden!important}
.grid,.layout,.main-grid{width:100%!important;display:grid!important;grid-template-columns:minmax(0,1fr) 330px!important;gap:12px!important;align-items:start!important}
.player,.videoBox,.video-wrap,.video-container{position:relative!important;width:100%!important;overflow:hidden!important;background:#000!important}
.player iframe,.player video,.videoBox iframe,.videoBox video,.video-wrap iframe,.video-wrap video,.video-container iframe,.video-container video,#videoFrame,#videoPlayer{width:100%!important;height:100%!important;object-fit:cover!important}
.watermark,.wc-watermark,#wcWatermark{position:absolute!important;top:8px!important;right:8px!important;z-index:9999!important;min-width:190px!important;height:58px!important;border-radius:9px!important;background:linear-gradient(180deg,rgba(8,27,52,.99),rgba(3,10,20,.99))!important;border:1px solid rgba(255,210,68,.85)!important;box-shadow:0 0 18px rgba(0,0,0,.85)!important;color:#fff!important;display:flex!important;align-items:center!important;justify-content:center!important;font-size:17px!important;font-weight:1000!important}
.player:after,.videoBox:after,.video-wrap:after,.video-container:after{content:"⚽ WC LIVE"!important;position:absolute!important;top:8px!important;right:8px!important;z-index:9998!important;width:210px!important;height:64px!important;border-radius:9px!important;background:linear-gradient(180deg,rgba(8,27,52,.99),rgba(3,10,20,.99))!important;border:1px solid rgba(255,210,68,.85)!important;box-shadow:0 0 18px rgba(0,0,0,.85)!important;color:#fff!important;display:flex!important;align-items:center!important;justify-content:center!important;font-size:18px!important;font-weight:1000!important;pointer-events:none!important}
.player:before,.videoBox:before,.video-wrap:before,.video-container:before{content:""!important;position:absolute!important;left:0!important;right:0!important;bottom:0!important;z-index:9997!important;height:64px!important;background:linear-gradient(90deg,#ff8b00 0%,#ffbd3b 45%,#ff8b00 100%)!important;border-top:1px solid rgba(255,255,255,.45)!important;pointer-events:none!important}
.banner,.ad-strip{position:relative!important;z-index:10000!important}
.player:fullscreen:after,.videoBox:fullscreen:after,.video-wrap:fullscreen:after,.video-container:fullscreen:after{top:16px!important;right:16px!important;width:250px!important;height:76px!important;font-size:21px!important}
.player:fullscreen:before,.videoBox:fullscreen:before,.video-wrap:fullscreen:before,.video-container:fullscreen:before{height:86px!important}
@media(max-width:1320px){.wc-shell{grid-template-columns:170px minmax(0,1fr) 170px!important;gap:12px!important}.wc-banner-inner,.wc-3d-banner{min-height:680px!important}.grid,.layout,.main-grid{grid-template-columns:minmax(0,1fr) 300px!important}}
@media(max-width:1080px){.wc-shell{display:block!important;padding:10px!important}.wc-side{display:none!important}.wc-top-hero{min-height:90px!important}.grid,.layout,.main-grid{grid-template-columns:1fr!important}.player:after,.videoBox:after,.video-wrap:after,.video-container:after{width:150px!important;height:48px!important;font-size:13px!important}.player:before,.videoBox:before,.video-wrap:before,.video-container:before{height:52px!important}}
@media(max-width:700px){.wc-top-hero{min-height:72px!important}.player:after,.videoBox:after,.video-wrap:after,.video-container:after{width:120px!important;height:40px!important;font-size:12px!important;top:6px!important;right:6px!important}.player:before,.videoBox:before,.video-wrap:before,.video-container:before{height:42px!important}}

/* ===== FIX 2 LOGO WC LIVE BẰNG ẢNH USER GỬI ===== */

/* Logo trên header */
.logo{
  width:180px!important;
  height:56px!important;
  display:block!important;
  background-image:url('assets/wc-live-logo.png')!important;
  background-size:contain!important;
  background-repeat:no-repeat!important;
  background-position:center!important;
  overflow:hidden!important;
}
.logo *{
  display:none!important;
}

/* Nếu theme dùng class brand/ball riêng thì ẩn hết để không chồng chữ */
.logo .ball,
.logo .brand,
.logo .brand small{
  display:none!important;
}

/* Logo WC LIVE ở góc video */
.watermark,
.wc-watermark,
#wcWatermark{
  width:190px!important;
  height:64px!important;
  min-width:190px!important;
  padding:0!important;
  top:8px!important;
  right:8px!important;
  background-image:url('assets/wc-live-logo.png')!important;
  background-size:contain!important;
  background-repeat:no-repeat!important;
  background-position:center!important;
  background-color:rgba(4,12,24,.98)!important;
  border:1px solid rgba(255,210,68,.85)!important;
  border-radius:9px!important;
  box-shadow:0 0 18px rgba(0,0,0,.85)!important;
  color:transparent!important;
  font-size:0!important;
  text-indent:-9999px!important;
}

/* Lớp che phụ ở góc phải video cũng đổi thành ảnh logo */
.player:after,
.videoBox:after,
.video-wrap:after,
.video-container:after{
  content:""!important;
  position:absolute!important;
  top:8px!important;
  right:8px!important;
  z-index:9998!important;
  width:210px!important;
  height:68px!important;
  border-radius:9px!important;
  background-image:url('assets/wc-live-logo.png')!important;
  background-size:contain!important;
  background-repeat:no-repeat!important;
  background-position:center!important;
  background-color:rgba(4,12,24,.98)!important;
  border:1px solid rgba(255,210,68,.85)!important;
  box-shadow:0 0 18px rgba(0,0,0,.85)!important;
  pointer-events:none!important;
}

/* Trên màn nhỏ logo tự nhỏ lại */
@media(max-width:1080px){
  .logo{width:155px!important;height:48px!important}
  .watermark,.wc-watermark,#wcWatermark{width:150px!important;height:50px!important;min-width:150px!important}
  .player:after,.videoBox:after,.video-wrap:after,.video-container:after{width:155px!important;height:52px!important}
}
@media(max-width:700px){
  .logo{width:135px!important;height:44px!important}
  .watermark,.wc-watermark,#wcWatermark{width:120px!important;height:42px!important;min-width:120px!important}
  .player:after,.videoBox:after,.video-wrap:after,.video-container:after{width:125px!important;height:44px!important}
}

</style>

<style id="final-ui-fix">
.watermark,.wc-watermark,#wcWatermark{
background:transparent!important;
background-color:transparent!important;
border:none!important;
box-shadow:none!important;
}
.player:after,.videoBox:after,.video-wrap:after,.video-container:after{
background-color:transparent!important;
border:none!important;
box-shadow:none!important;
}
.top-banner,.hero-banner,.worldcup-banner{
background-size:cover!important;
background-position:center center!important;
}
@media(min-width:1200px){
.left-banner,.right-banner{width:180px!important;}
}
</style>

</head><body><script>window.location.href="/";</script>
<script>
(function(){
  function box(){return document.querySelector('.player')||document.querySelector('.videoBox')||document.querySelector('.video-wrap')||document.querySelector('.video-container');}
  function full(){var b=box(); if(!b) return false; try{(b.requestFullscreen||b.webkitRequestFullscreen||b.msRequestFullscreen).call(b); return true;}catch(e){return false;}}
  document.addEventListener('click',function(e){
    var t=e.target; if(!t) return;
    var s=((t.innerText||'')+' '+(t.title||'')+' '+(t.getAttribute('aria-label')||'')+' '+(t.className||'')).toLowerCase();
    if(s.includes('fullscreen')||s.includes('toàn màn')||s.includes('phóng to')||(t.closest&&t.closest('.fullscreen,.fullScreen,.btn-fullscreen,#fullscreenBtn'))){
      if(full()){e.preventDefault();e.stopPropagation();}
    }
  },true);
})();
</script>

</body></html>
