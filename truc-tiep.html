<script>
(function(){
  function box(){return document.querySelector('.player')||document.querySelector('.videoBox')||document.querySelector('.video-wrap')||document.querySelector('.video-container');}
  function full(){var b=box(); if(!b) return false; try{(b.requestFullscreen||b.webkitRequestFullscreen||b.msRequestFullscreen).call(b); return true;}catch(e){return false;}}
  document.addEventListener('click',function(e){
    var t=e.target; if(!t) return;
    var s=((t.innerText||'')+' '+(t.title||'')+' '+(t.getAttribute('aria-label')||'')+' '+(t.className||'')).toLowerCase();
    if(s.includes('fullscreen')||s.includes('toàn màn')||s.includes('phóng to')||(t.closest&&t.closest('.fullscreen,.fullScreen,.btn-fullscreen,#fullscreenBtn'))){
      if(full()){e.preventDefault();e.stopPropagation();}
    }
  },true);
})();
</script>


<script>
/* Link cho 5 banner: top đỏ, top xanh, trái, phải, 2 banner dưới video */
(function(){
  function setHref(sel, url){document.querySelectorAll(sel).forEach(a=>{a.href=url||'#';});}
  function applyBannerLinks(){
    var receive=(document.getElementById('promo1')&&document.getElementById('promo1').href)||localStorage.getItem('wc_receive_link')||localStorage.getItem('wc_left_ad_url')||'#';
    var bet=(document.getElementById('promo2')&&document.getElementById('promo2').href)||localStorage.getItem('wc_bet_link')||localStorage.getItem('wc_right_ad_url')||'#';
    setHref('[data-link-slot="receive"],#leftAdLink', receive);
    setHref('[data-link-slot="bet"],#rightAdLink', bet);
  }
  window.applyBannerLinks=applyBannerLinks;
  document.addEventListener('DOMContentLoaded',applyBannerLinks);
  setInterval(applyBannerLinks,1500);
})();
</script>
